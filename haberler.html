<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENGAVER ROVER - HABERLER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fontlar: Inter (Metinler) ve Rubik Dirt (Başlıklar) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rubik+Dirt&display=swap" rel="stylesheet">
    <style>
        /* ============================== */
        /* 🎨 RENK PALETİ VE GLOBAL STİLLER */
        /* ============================== */
        :root { 
            --poster-orange: #DF5A00; 
            --poster-hover: #B54800; 
        }

        * {
            text-decoration: none;
            padding: 0;
            margin: 0;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #050505; /* Karanlık Uzay Siyahı */
            /* Uzay temalı karanlık turuncu gradient arka plan */
            
            background-attachment: fixed;
            color: #f0f0f0;
        }

        /* YILDIZ EFEKTLERİ */
        #universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6; /* Parlaklığı karanlık temaya uyduruldu */
        }
        .star0, .star1, .star2, .star3 { position: fixed; background-color: white; opacity: 1; }
        .star0 { height: 1px; width: 1px; }
        .star1 { height: 2px; width: 2px; border-radius: 50%; }
        .star2 { height: 3px; width: 3px; border-radius: 50%; }
        .star3 { height: 4px; width: 4px; border-radius: 50%; }

        /* ============================== */
        /* 🧭 NAVİGASYON (MENÜ) STİLLERİ */
        /* ============================== */
        ul.navbar { list-style: none; background-color: var(--poster-orange); display: flex; justify-content: center; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1002; flex-wrap: wrap; height: auto;}
    ul.navbar li { display: inline-block; position: relative; }
    ul.navbar li a { display: block; padding: 20px 25px; color: aliceblue; text-decoration: none; text-align: center; font-size: 18px; font-weight: 600; }
   ul.navbar li ul.dropdown { 
    top: 100%; 
    background: var(--poster-orange); 
    position: absolute; 
    z-index: 1000; 
    display: none; 
    left: 0; 
    min-width: 300px; /* Genişliği 250'den 300'e çıkardık */
    padding: 5px 0; /* İç boşluk ekledik */
}
ul.navbar li ul.dropdown li a { 
    padding: 15px 20px; 
    text-align: center; /* İstersen left de yapabilirsin */
    white-space: nowrap; /* Metinlerin alt satıra kaymasını engeller */
    font-size: 16px;
}
    ul.navbar li a:hover { background: var(--poster-hover); }
    ul.navbar li:hover ul.dropdown { display: block; }
        .logo-container { margin-left: auto; }
        .logo-wrapper { display: flex; align-items: center; gap: 10px; }
        .logo { height: auto; width: 100px }
        .logo-text { color: white; font-size: 24px; font-weight: bold; font-family: monospace; letter-spacing: 1px; }
        

        /* ANA BAŞLIK */
        .basbaslik {
            position: relative;
            text-align: center;
            padding: 50px 0 10px 0;
            color: var(--poster-orange);
            font-size: 56px;
            font-weight: 400;
            z-index: 1001;
            font-family: 'Rubik Dirt', cursive; /* Grunge Font Uygulandı */
            letter-spacing: 3px;
        }

        .altbaslik {
            position: relative;
            text-align: center;
            padding: 0 20px 40px 20px;
            color: #fff;
            font-size: 16px;
            z-index: 1001;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* ============================== */
        /* 📰 HABER FİLTRE SEKMELERİ */
        /* ============================== */
        .filtre-sekmeleri {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        .filtre-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(223, 90, 0, 0.4);
            color: #f0f0f0;
            padding: 10px 22px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filtre-btn:hover {
            background: rgba(223, 90, 0, 0.15);
        }

        .filtre-btn.aktif {
            background: var(--poster-orange);
            color: #fff;
            font-weight: bold;
            border-color: var(--poster-orange);
        }

        /* ============================== */
        /* 📢 HABER KARTLARI (GRID) */
        /* ============================== */
        .haber-paneli {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 90%;
            margin: 0 auto 60px auto;
            max-width: 1200px;
            z-index: 10;
            position: relative;
        }

        .haber-karti {
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(223, 90, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .haber-karti:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 36px 0 rgba(223, 90, 0, 0.15);
            border-color: var(--poster-orange);
        }

        .haber-gorsel-alani {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: rgba(0,0,0,0.3);
        }

        .haber-gorsel-alani img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .haber-karti:hover .haber-gorsel-alani img {
            transform: scale(1.05);
        }

        .kaynak-etiketi {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(5, 5, 5, 0.7);
            color: var(--poster-orange);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(223, 90, 0, 0.4);
            font-weight: 600;
        }

        .kaynak-etiketi.instagram i { color: #e1306c; }

        .haber-icerik {
            padding: 18px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .haber-tarih {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .haber-icerik h3 {
            font-size: 1.05em;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .haber-icerik p {
            font-size: 13px;
            color: #c9c9c9;
            line-height: 1.6;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .haber-link {
            font-size: 13px;
            color: var(--poster-orange);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
            transition: color 0.3s ease;
            font-weight: 600;
        }

        .haber-link:hover { color: var(--poster-hover); }

        .haber-link.devam-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            padding: 0;
        }

        .haber-link.devam-btn i {
            transition: transform 0.3s ease;
        }

        .haber-link.devam-btn.acik i {
            transform: rotate(90deg);
        }

        .haber-devam {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, margin-top 0.5s ease-in-out;
            font-size: 13px;
            color: #c9c9c9;
            line-height: 1.6;
        }

        .haber-devam.acik {
            max-height: 500px;
            margin-top: 12px;
        }

        /* ============================== */
        /* 📱 MOBİL UYUMLULUK (RESPONSIVE) */
        /* ============================== */
        .hamburger{display: none;}
        
        @media (max-width: 1050px) {
            .team-page-container { max-width: 90%; margin-top: 30px; }
            .about-block { flex-direction: column  !important; text-align: center;  }
            .about-block .text { padding: 20px; max-width: 100%; }
            .member-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
            .haber-paneli { grid-template-columns: repeat(2, 1fr); }
        }

        /* 2. Telefonlar (768px altı) */
        .hamburger {
            display: flex;
            font-size: 26px;
            color: white;
            cursor: pointer;
            padding-left: 290px;
        }

        .ikonlar {
            position: absolute;
            top: 75px;
            right: 20px;
            display: flex;
            gap: 20px;
            z-index: 1001;
        }

        .ikonlar a { font-size: 50px; color: aliceblue; }
        .ikonlar a:hover { color: var(--poster-orange); }
        .hamburger { display: none !important; }

        @media (max-width: 768px) {
            ul.navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 15px;
                height: 70px;
            }

            .logo-container {
                margin: 0;
                width: auto;
                order: 0;
            }

            .logo-wrapper {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .hamburger {
                display: block !important;
                font-size: 24px;
                color: white;
                cursor: pointer;
                padding: 10px;
                order: 2; 
            }

            ul.navbar li:not(.logo-container) {
                display: none;
                width: 100%;
                text-align: center;
                background: var(--poster-orange);
            }

            ul.navbar.open { height: auto; }
            ul.navbar.open li:not(.logo-container) { display: block; }

            .ikonlar {
                position: absolute !important;
                top: 100px;    
                right: 15px !important; 
                left: auto !important;  
                display: flex !important;
                flex-direction: row;    
                gap: 15px;      
                width: auto !important; 
            }

            .ikonlar a { font-size: 35px; }

            .hero-section {
                min-height: auto !important;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .baslik {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                transform: none !important;
                font-size: 26px;
                margin-top: 20px;
                width: 100%;
            }

            .aciklama {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                transform: none !important;
                width: 100% !important;
                margin: 15px auto !important;
                font-size: 15px;
                padding: 0 10px;
            }

            .haribo{ height: auto; width: 125px; left: 30px; }

            .logo-container { 
                margin: 10px 0; 
                order: -1; 
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .logo-text { color: white; font-size: 20px; font-weight: bold; font-family: monospace; white-space: nowrap; }
            .logo-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; flex-wrap: nowrap; justify-content: flex-start; }

            h1 { font-size: 24px; letter-spacing: 2px; margin-bottom: 30px; }
            h2 { font-size: 20px; }

            .member-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .member-card img { width: 70px; height: 70px; }
            .member-card h4 { font-size: 14px; }
            .timeline-container::after { left: 20px; } 
            .timeline-item { width: 100%; padding-left: 50px; padding-right: 10px; left: 0 !important; }
            body { overflow-x: hidden; }

            /* Başlık Mobilde Uyumlu */
            .basbaslik { font-size: 42px; padding-top: 30px; }
            .haber-paneli { grid-template-columns: 1fr; width: 88%; }
            .filtre-btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

        <li><a href="yarismalar.html#erc" target="_blank">EUROPEAN ROVER CHALLENGE</a></li>

</li>
        <li><a href="takımımız.html">TAKIMIMIZ</a></li>
        <li><a href="bizeulas.html">İLETİŞİM</a></li>
        <li class="logo-container">
            <div class="logo-wrapper">
                <img src="resimler/Genel Logo (Beyaz).png" alt="Logo" class="logo">
                <span class="logo-text">CENGAVER ROVER</span>
                <div class="hamburger"> <i class="fa-solid fa-bars"></i></div>
            </div>
        </li>
    </ul>
 

    <div class="basbaslik">HABERLER</div>
    <div class="altbaslik">Instagram paylaşımlarımız ve takımdan son gelişmeler</div>

    <div class="filtre-sekmeleri">
        <button class="filtre-btn aktif" onclick="filtrele(this, 'hepsi')">Hepsi</button>
        <button class="filtre-btn" onclick="filtrele(this, 'instagram')">Instagram</button>
        <button class="filtre-btn" onclick="filtrele(this, 'haber')">Haberler</button>
    </div>

    <div class="haber-paneli">
        <!-- Haberler buraya JS ile yüklenecek -->
    </div>

    <div id="universe"></div>

    <script>
        // --- DINAMIK HABER YUKLEME ---
        fetch('veri/haberler.json')
            .then(response => response.json())
            .then(data => {
                const panel = document.querySelector('.haber-paneli');
                panel.innerHTML = ''; 
                
                // Eğer JSON yapısı bir obje içindeyse onu al, değilse direkt listeyi kullan
                const haberler = data.haberler_listesi ? data.haberler_listesi : data;

                haberler.forEach(haber => {
                    const kart = `
                        <div class="haber-karti" data-tur="${haber.category || 'haber'}">
                            <div class="haber-gorsel-alani">
                                <span class="kaynak-etiketi ${haber.category || ''}"><i class="fa-solid fa-newspaper"></i> ${haber.category || 'Haber'}</span>
                                <img src="${haber.image || ''}" alt="${haber.title}">
                            </div>
                            <div class="haber-icerik">
                                <span class="haber-tarih">📅 ${haber.date || ''}</span>
                                <h3>${haber.title || ''}</h3>
                                <p>${haber.description || ''}</p>
                                <a href="${haber.link || '#'}" target="_blank" class="haber-link">Devamını oku...</a>
                            </div>
                        </div>`;
                    panel.innerHTML += kart;
                });
            })
            .catch(err => console.log('Haberler yüklenirken hata oluştu:', err));

        // --- DIGER FONKSIYONLAR ---
        function filtrele(btn, tur) {
            document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
            btn.classList.add('aktif');

            document.querySelectorAll('.haber-karti').forEach(kart => {
                if (tur === 'hepsi' || kart.getAttribute('data-tur') === tur) {
                    kart.style.display = 'flex';
                } else {
                    kart.style.display = 'none';
                }
            });
        }
    </script>
    <script>
        // YILDIZ EFEKTLERİ JS KODU
        var starCount = 200;
        var universe = document.getElementById("universe");
        var width = window.innerWidth;
        var height = window.innerHeight;

        for (var i = 0; i < starCount; ++i) {
            var ypos = Math.round(Math.random() * height);
            var star = document.createElement("div");
            var speed = 5000 * (Math.random() * 15 + 1);
            star.setAttribute("class", "star" + (3 - Math.floor(speed / 1000 / 8)));
            star.style.backgroundColor = "white";
            universe.appendChild(star);
            star.animate([
                { transform: "translate3d(" + width + "px, " + ypos + "px, 0)" },
                { transform: "translate3d(-256px, " + ypos + "px, 0)" }
            ], {
                delay: Math.random() * -speed,
                duration: speed,
                iterations: Infinity
            });
        }
        
        const hamburger = document.querySelector('.hamburger');
        const navbar = document.querySelector('.navbar');

        hamburger.addEventListener('click', () => {
            navbar.classList.toggle('open');
        });
    </script>
</body>
